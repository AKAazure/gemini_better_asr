<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Voice Settings</title>
  <style>
    :root {
      --blue-600: #2563eb;
      --blue-100: #dbeafe;
      --slate-50: #f8fafc;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-500: #64748b;
      --slate-900: #0f172a;
      --green-600: #16a34a;
      --white: #ffffff;
    }

    body {
      width: 350px;
      height: 320px;
      margin: 0;
      padding: 0;
      background-color: var(--slate-50);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--slate-900);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background-color: var(--blue-600);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .icon-box {
      background-color: rgba(255, 255, 255, 0.2);
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-text h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .header-text p {
      margin: 0;
      font-size: 12px;
      color: var(--blue-100);
    }

    /* Content */
    .content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background-color: var(--white);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--slate-200);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-500);
      text-transform: uppercase;
      letter-spacing: 0.025em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background-color: var(--slate-50);
      border: 1px solid var(--slate-300);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--blue-600);
      box-shadow: 0 0 0 2px var(--blue-100);
    }

    .hint {
      font-size: 12px;
      color: var(--slate-500);
      line-height: 1.4;
      margin: 0;
    }

    /* Button */
    button {
      margin-top: auto;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      background-color: var(--slate-900);
      color: var(--white);
    }

    button:hover {
      background-color: #1e293b;
    }

    button.success {
      background-color: var(--green-600);
    }

    /* Icons */
    svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; color: white;">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
    </div>
    <div class="header-text">
      <h1>Gemini Voice</h1>
      <p>Extension Settings</p>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="label">
        <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; color: var(--blue-600);">
          <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
        </svg>
        OpenAI API Key
      </div>
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <p class="hint">Required for speech-to-text. Keys are stored locally in your browser.</p>
    </div>

    <button id="saveBtn">
      <span id="saveIcon">
        <svg viewBox="0 0 24 24">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
      </span>
      <span id="checkIcon" style="display: none;">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span id="btnText">Save Key</span>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

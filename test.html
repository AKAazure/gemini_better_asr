<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Voice Waveform Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f4f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      margin-top: 0;
      color: #1f1f1f;
      font-size: 24px;
    }

    p {
      color: #444746;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    /* Styles copied from content.js */
    .gemini-voice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px; /* Larger for demo */
      height: 60px; /* Larger for demo */
      min-width: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #f0f4f9;
      color: #444746;
      transition: background 0.2s, transform 0.1s;
      margin: 0 auto;
      outline: none;
    }

    .gemini-voice-btn:hover {
      background: #e1e5ea;
    }

    .gemini-voice-btn:active {
      transform: scale(0.95);
    }

    .gemini-voice-btn.recording {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
    
    /* Waveform Animation */
    .gemini-voice-waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px; /* Slightly larger gap for demo */
      height: 24px; /* Larger for demo */
      width: 40px; /* Larger for demo */
    }
    
    .gemini-voice-bar {
      width: 4px; /* Thicker for demo */
      background-color: #ef4444;
      border-radius: 2px;
      height: 10%; 
      transition: height 0.05s ease;
      will-change: height;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Microphone Test</h1>
    <p>Click the button below to test the voice activity detection and waveform animation. No data is sent.</p>
    
    <div id="btn-container"></div>
  </div>

  <script>
    // --- Logic Mirroring content.js ---

    let isRecording = false;
    let audioContext = null;
    let analyser = null;
    let animationId = null;
    let mediaStream = null;

    const ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
    
    const WAVEFORM_HTML = `
      <div class="gemini-voice-waveform">
        <div class="gemini-voice-bar"></div>
        <div class="gemini-voice-bar"></div>
        <div class="gemini-voice-bar"></div>
        <div class="gemini-voice-bar"></div>
        <div class="gemini-voice-bar"></div>
      </div>
    `;

    function createMicButton() {
      const btn = document.createElement("button");
      btn.innerHTML = ICON_SVG;
      btn.className = "gemini-voice-btn";
      btn.title = "Test Microphone";
      btn.addEventListener("click", handleMicClick);
      return btn;
    }

    async function handleMicClick(e) {
      const btn = e.currentTarget;

      if (!isRecording) {
        // Start Recording Simulation
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          
          await setupVisualizer(mediaStream);
          
          isRecording = true;
          btn.innerHTML = WAVEFORM_HTML;
          btn.classList.add("recording");
          
        } catch (err) {
          console.error("Mic Error:", err);
          alert("Could not access microphone. Please ensure permission is granted.");
        }
      } else {
        // Stop Recording
        isRecording = false;
        stopVisualizer();
        
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
          mediaStream = null;
        }

        btn.innerHTML = ICON_SVG;
        btn.classList.remove("recording");
      }
    }

    async function setupVisualizer(stream) {
      try {
        audioContext = new AudioContext();
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        
        // Exact settings from content.js
        analyser.fftSize = 256; 
        analyser.smoothingTimeConstant = 0.6;
        source.connect(analyser);
        
        visualize();
      } catch (e) {
        console.error("Audio Context Setup Error:", e);
      }
    }

    function visualize() {
      if (!isRecording || !analyser) return;
      
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteFrequencyData(dataArray);
      
      // Calculate average volume roughly 0-255
      // Bins 1 to 20 cover approx 170Hz to 3400Hz.
      let sum = 0;
      const startBin = 1;
      const endBin = 20;
      for(let i = startBin; i <= endBin; i++) {
        sum += dataArray[i];
      }
      const averageVolume = sum / (endBin - startBin + 1);

      const bars = document.querySelectorAll('.gemini-voice-bar');
      if (bars.length === 5) {
          // Noise gate
          if (averageVolume < 5) {
            bars.forEach(bar => bar.style.height = '10%');
          } else {
            // Distribute bars
            const indices = [2, 4, 8, 12, 16];
            
            bars.forEach((bar, i) => {
                const val = dataArray[indices[i]] || 0;
                
                let percent = 10 + (val / 255) * 120;
                
                if (percent > 100) percent = 100;
                if (percent < 10) percent = 10;
                
                bar.style.height = `${percent}%`;
            });
          }
      }
      
      animationId = requestAnimationFrame(visualize);
    }

    function stopVisualizer() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      if (audioContext) {
        audioContext.close().catch(console.error);
        audioContext = null;
      }
      analyser = null;
    }

    // Init
    document.getElementById('btn-container').appendChild(createMicButton());

  </script>
</body>
</html>
